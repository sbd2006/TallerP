<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact List</title>
  <link rel="stylesheet" href="css/Estilo.css" />
  <script src="js/fun.js" defer></script>
</head>
<body>
  <header class="hero">
    <div class="hero__illustration" aria-hidden="true">
      <div class="icon-box icon-box--phone">😶‍🌫️</div>
      <div class="icon-box icon-box--mail">@</div>
      <div class="icon-box icon-box--envelope">😬</div>
      <div class="hand"> 👍 </div>
    </div>

    <h1 class="hero__title">Contact List</h1>
  </header>

  <main class="container">
    <section class="form-card" aria-labelledby="form-title">
      <h2 id="form-title" class="sr-only">Formulario de contacto</h2>

      <form id="contactForm" novalidate>
        <div class="form-grid">
          <input type="text" id="name" placeholder="Input your name" autocomplete="off" />
          <input type="text" id="lastname" placeholder="Input your lastname" autocomplete="off" />
          <input type="text" id="phone" placeholder="Input your phone" autocomplete="off" />
          <input type="text" id="city" placeholder="Input your city" autocomplete="off" />
          <input type="text" id="address" placeholder="Input your address" autocomplete="off" />
        </div>

        <div class="gender">
          <label>
            <input type="radio" name="gender" value="female" checked />
            <span class="gender__text">Female</span>
          </label>

          <label>
            <input type="radio" name="gender" value="male" />
            <span class="gender__text">Male</span>
          </label>
        </div>

        <div class="actions">
          <button type="submit" id="saveBtn" class="btn">ADD</button>
          <button type="button" id="cancelBtn" class="btn btn--secondary" hidden>Cancel</button>
        </div>

        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="list-section" aria-labelledby="list-title">
      <h2 id="list-title" class="sr-only">Lista de contactos</h2>
      <ul id="contactList" class="contact-list"></ul>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>
</body>
</html>
